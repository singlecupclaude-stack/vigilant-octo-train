<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>Single Cup Coffee — Купить</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { color-scheme: only light; }

  body {
    background: #fff;
    font-family: 'Montserrat', sans-serif;
    color: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
    -webkit-text-size-adjust: 100%;
  }

  .page {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .logo-wrap {
    margin-bottom: 1.8rem;
    animation: fadeDown 0.5s ease both;
  }

  .logo-img {
    width: 150px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .tagline {
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 1.8rem;
    animation: fadeIn 0.5s 0.15s ease both;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.4rem;
    animation: fadeIn 0.5s 0.2s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #E5E5E5;
  }
  .divider span {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #aaa;
    white-space: nowrap;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 2rem;
  }

  .store-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    background: transparent;
    border: 1.5px solid #CC0000;
    border-radius: 10px;
    padding: 14px 14px;
    min-height: 64px;
    transition: background 0.15s ease, box-shadow 0.15s ease;
    animation: fadeUp 0.45s ease both;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .store-link:nth-child(1) { animation-delay: 0.18s; }
  .store-link:nth-child(2) { animation-delay: 0.24s; }
  .store-link:nth-child(3) { animation-delay: 0.30s; }
  .store-link:nth-child(4) { animation-delay: 0.36s; }
  .store-link:nth-child(5) { animation-delay: 0.42s; }

  .store-link:hover {
    background: #CC0000;
    box-shadow: 0 4px 16px rgba(204,0,0,0.18);
    transform: translateY(-1px);
  }

  .store-link:active {
    background: #CC0000;
    box-shadow: 0 2px 8px rgba(204,0,0,0.2);
    transform: scale(0.985);
  }

  .store-link:hover .store-name { color: #fff; }
  .store-link:hover .store-sub  { color: rgba(255,255,255,0.75); }
  .store-link:hover .store-arrow { background: rgba(255,255,255,0.2); }
  .store-link:hover .store-arrow svg { stroke: #fff; }

  .store-link:active .store-name { color: #fff; }
  .store-link:active .store-sub  { color: rgba(255,255,255,0.75); }
  .store-link:active .store-arrow { background: rgba(255,255,255,0.2); }
  .store-link:active .store-arrow svg { stroke: #fff; }

  @media (max-width: 380px) {
    .logo-img { width: 120px; }
    .store-name { font-size: 13px; }
    .store-sub { font-size: 10.5px; }
    .store-badge { width: 36px; height: 36px; font-size: 11px; }
  }

  .store-left {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }

  .store-badge {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .b-ozon  { background: #ECF0FF; color: #1A3DCC; }
  .b-wb    { background: #F3E8FF; color: #7C00CC; }
  .b-ym    { background: #FFF0F0; color: #CC0000; }
  .b-mega  { background: #E8F3FF; color: #0055CC; }
  .b-sc    { background: #FFEAEA; color: #CC0000; }

  .store-name {
    font-weight: 700;
    font-size: 13.5px;
    color: #111;
    line-height: 1.2;
    transition: color 0.18s;
  }

  .store-sub {
    font-size: 11px;
    font-weight: 400;
    color: #999;
    margin-top: 2px;
    transition: color 0.18s;
  }

  .store-arrow {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #CC0000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s;
  }

  .store-arrow svg {
    width: 13px;
    height: 13px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.18s;
  }

  .footer-text {
    font-size: 10.5px;
    font-weight: 400;
    color: #bbb;
    letter-spacing: 0.03em;
    animation: fadeIn 0.5s 0.55s ease both;
  }

  .footer-link {
    color: #CC0000;
    text-decoration: none;
    font-weight: 500;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
